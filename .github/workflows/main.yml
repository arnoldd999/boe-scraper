name: Scrape BOE and Import to Database

on:
  # Permite ejecución manual desde la pestaña "Actions" de GitHub
  workflow_dispatch:
  
  # Ejecución programada (ej. todos los días a las 3:30 AM UTC)
  schedule:
    - cron: "30 3 * * *"

jobs:
  scrape_and_import:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      # --- FILTROS PARA LA RECOPILACIÓN DIARIA ---
      # PU=Próx. apertura, EJ=Celebrándose. Buscamos subastas activas para refrescar su estado.
      BOE_ESTADO: "PU,EJ"
      # I=Inmuebles, V=Vehículos
      BOE_TIPO_BIEN: "I,V"
      # Provincia y Localidad (ajusta según necesites)
      BOE_PROVINCIA: "12"
      BOE_LOCALIDAD: "Castellón de la Plana"

      # --- NOMBRES DE FICHEROS INTERMEDIOS ---
      LINKS_OUTPUT_FILE: "links_activos.jsonl"
      INPUT_LINKS_JSONL: "links_activos.jsonl"
      OUTPUT_DETAIL_JSONL: "subastas_detalle.jsonl"

      # --- CONFIGURACIÓN DE EJECUCIÓN ---
      HEADLESS: "1"
      TEST_LIMIT: "0" # Sin límite en producción

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Python and Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          # Asume que tienes un requirements.txt con playwright, mysql-connector-python, etc.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: 3. Run Link Collector (script1.py)
        run: python script1.py

      - name: 4. Run Detail Scraper (script2.py)
        run: python script2.py

      - name: 5. Run Database Importer (importer.py)
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        # Este es el nuevo script que debes crear
        run: python importer.py

      - name: 6. (Opcional) Upload Artifacts for Debugging
        if: failure() # Sube los logs y ficheros solo si el job falla
        uses: actions/upload-artifact@v4
        with:
          name: scraper-artifacts-on-failure
          path: |
            *.jsonl
            *.png
