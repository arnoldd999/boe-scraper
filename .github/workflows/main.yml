name: Scrape BOE and Import to Database

on:
  # Permite ejecución manual desde la pestaña "Actions" de GitHub
  workflow_dispatch:
  
  # Ejecución programada (ej. todos los días a las 3:30 AM UTC)
  schedule:
    - cron: "30 3 * * *"

jobs:
  scrape_and_import:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 horas máximo

    env:
      # --- FILTROS PARA LA RECOPILACIÓN DIARIA ---
      BOE_PROVINCIA: "ALL" 
      BOE_ESTADO: "EJ,PU"
      BOE_TIPO_BIEN: "I,V"

      # --- NOMBRES DE FICHEROS INTERMEDIOS ---
      LINKS_OUTPUT_FILE: "links_activos.jsonl"
      INPUT_LINKS_JSONL: "links_activos.jsonl"
      OUTPUT_DETAIL_JSONL: "subastas_detalle.jsonl"

      # --- CONFIGURACIÓN DE EJECUCIÓN ---
      HEADLESS: "1"
      TEST_LIMIT: "0" # 0 para producción
      
      # --- OPTIMIZACIÓN DE RENDIMIENTO ---
      # 6 es el punto dulce para los runners de GitHub (2 vCPU / 7GB RAM)
      # Más de 6 podría saturar la CPU y causar timeouts.
      MAX_CONCURRENCY: "6" 
      NAV_TIMEOUT_MS: "60000" # 60s por página para evitar errores si la CPU va lenta

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Python and Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Instalar Playwright y sus dependencias de navegador
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: 3. Run Link Collector (script1.py)
        run: python script1.py

      - name: 4. Run Detail Scraper (script2.py)
        run: python script2.py

      - name: 5. Compress results
        run: gzip -c subastas_detalle.jsonl > subastas_detalle.jsonl.gz

      - name: 6. Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /public_ftp/subastas/
          local-dir: ./
          include: subastas_detalle.jsonl.gz

      - name: 7. (Opcional) Upload Artifacts for Debugging
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-artifacts-on-failure
          path: |
            *.jsonl
            *.png
