name: Scrape BOE and Import to Database

on:
  # Permite ejecución manual desde la pestaña "Actions" de GitHub
  workflow_dispatch:
  
  # Ejecución programada (ej. todos los días a las 3:30 AM UTC)
  schedule:
    - cron: "30 3 * * *"

jobs:
  scrape_and_import:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      # --- FILTROS PARA LA RECOPILACIÓN DIARIA ---
      # PU=Próx. apertura, EJ=Celebrándose. Buscamos subastas activas para refrescar su estado.
      BOE_ESTADO: "EJ,PU"
      # I=Inmuebles, V=Vehículos
      BOE_TIPO_BIEN: "I,V"
      # Provincia y Localidad (ajusta según necesites)
      BOE_PROVINCIA: "46"
      BOE_LOCALIDAD: "Valencia"

      # --- NOMBRES DE FICHEROS INTERMEDIOS ---
      LINKS_OUTPUT_FILE: "links_activos.jsonl"
      INPUT_LINKS_JSONL: "links_activos.jsonl"
      OUTPUT_DETAIL_JSONL: "subastas_detalle.jsonl"

      # --- CONFIGURACIÓN DE EJECUCIÓN ---
      HEADLESS: "1"
      TEST_LIMIT: "0"

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Python and Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          # Asume que tienes un requirements.txt con playwright, mysql-connector-python, etc.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: 3. Run Link Collector (script1.py)
        run: python script1.py

      - name: 4. Run Detail Scraper (script2.py)
        run: python script2.py

      - name: 5. Compress results
        run: gzip -c subastas_detalle.jsonl > subastas_detalle.jsonl.gz

      - name: 6. Upload JSONL via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "subastas_detalle.jsonl.gz"
          target: "/home/${{ secrets.SSH_USER }}/public_ftp/subastas/"

      - name: 7. Run Importer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/scripts
            DB_HOST=${{ secrets.DB_HOST}} DB_USER={{ secrets.DB_USER}} DB_PASS="${{ secrets.DB_PASS }}" DB_NAME= {{ secrets.DB_NAME }} OUTPUT_DETAIL_JSONL=/home/${{ secrets.SSH_USER }}/public_ftp/subastas/subastas_detalle.jsonl.gz /home/${{ secrets.SSH_USER }}/virtualenv/scripts/3.11/bin/python importer.py

      - name: 6. (Opcional) Upload Artifacts for Debugging
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-artifacts-on-failure
          path: |
            *.jsonl
            *.png
